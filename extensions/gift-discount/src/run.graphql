query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            handle
          }
        }
      }
    }
  }
  shop {
    # App-owned config, synced from loyalty_config "gift_tiers" by app/routes/app.gift.tsx on save.
    metafield(namespace: "$app:gift", key: "tiers") {
      jsonValue
    }
  }
}
