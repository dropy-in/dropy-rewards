api_version = "2026-07"

[[extensions]]
name = "Free Gifts (tiered)"
handle = "gift-discount"
type = "function"
description = "Zeroes tiered, cumulative free-gift cart lines (replaces the stacked Bxgy gifts)."
uid = "a3f1c2d4-5b6e-47a8-9c0d-1e2f3a4b5c6d"

  # product_discount API: one function can zero ALL qualifying gift lines, so cumulative
  # gifts work with no Buy-X-Get-Y stacking limit.
  [[extensions.targeting]]
  target = "purchase.product-discount.run"
  input_query = "src/run.graphql"
  export = "run"

  # JS/TS functions: empty command lets the CLI run its built-in build (esbuild + javy)
  # to dist/function.wasm.
  [extensions.build]
  command = ""
  path = "dist/function.wasm"
